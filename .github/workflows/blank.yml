name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        cache: 'gradle'

    - name: Setup Docker
      uses: docker/setup-buildx-action@v3

    - name: Prepare Assets
      run: |
        # Recreate the missing Dockerfile in the root directory
        cat << 'EOF' > Dockerfile.openclaw-builder
        FROM --platform=linux/arm64/v8 ubuntu:22.04
        
        # Install basic tools needed to build/bundle runtime assets
        ENV DEBIAN_FRONTEND=noninteractive
        RUN apt-get update && apt-get install -y \
            curl \
            git \
            build-essential \
            python3 \
            & \
            rm -rf /var/lib/apt/lists/*
            
        WORKDIR /workspace
        EOF

        echo "Created missing Dockerfile.openclaw-builder dynamically."

        # Grant execution and run the asset setup script
        chmod +x ./scripts/setup-assets.sh
        ./scripts/setup-assets.sh

    - name: Grant Execute Permission to Gradlew
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: andClaw-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
